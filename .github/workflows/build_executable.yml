name: Build Python Executables

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  PROJECT_VERSION: '1.0.0'  # Define version here

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry

      - name: Configure Poetry for Windows
        if: runner.os == 'Windows'
        run: |
          echo "PATH=$env:USERPROFILE\.poetry\bin;$env:PATH" >> $GITHUB_ENV

      - name: Configure Poetry for Mac
        if: runner.os == 'macOS'
        run: |
          echo "PATH=$HOME/.local/bin:$PATH" >> $GITHUB_ENV

      - name: Install Dependencies
        run: poetry install

      - name: Build Executable with PyInstaller
        run: poetry run pyinstaller --onefile --name coursera-scraper-${{ env.PROJECT_VERSION }} grade_verification/scripts/coursera_controller.py

      - name: Rename Executable for OS
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            mv dist/coursera-scraper-${{ env.PROJECT_VERSION }}.exe dist/coursera-scraper-${{ env.PROJECT_VERSION }}-win.exe
          else
            mv dist/coursera-scraper-${{ env.PROJECT_VERSION }} dist/coursera-scraper-${{ env.PROJECT_VERSION }}-mac
          fi

      - name: Upload Executable
        uses: actions/upload-artifact@v4
        with:
          name: executable-${{ matrix.os }}-${{ env.PROJECT_VERSION }}
          path: dist/coursera-scraper-${{ env.PROJECT_VERSION }}-*
